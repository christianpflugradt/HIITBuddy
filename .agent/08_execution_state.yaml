execution_state:
  product: HIITBuddy
  last_updated: "2026-06-10"
  status_terms:
    pending: Not started.
    in_progress: Currently being implemented.
    completed: Implemented and verified.
    blocked: Cannot continue without a decision or external change.

go_protocol:
  trigger: User message exactly or effectively saying "go".
  behavior:
    - Read this file before making implementation changes.
    - Select the first increment whose status is pending.
    - Mark it in_progress before or while starting work.
    - Implement only that increment unless a tiny supporting change is required.
    - Run the verification commands listed on the increment when available.
    - Update ist_zustand and the increment status after verification.
    - If blocked, record the blocker in this file.
    - Respond with what changed, what was verified, and what the next pending increment is.
  scope_control: >
    Each "go" should move the project forward by one coherent, reviewable
    increment. Avoid bundling unrelated future increments into the same step.
  local_runtime_rule: >
    For browser verification, use "make build" to rebuild and start the Docker
    Compose service on port 8080. A separate "make up" is only needed when the
    image is already built and the container is stopped. Do not stop the
    container between rebuilds unless cleanup or final verification requires it.

ist_zustand:
  summary: >
    The repository contains the product specifications plus a minimal
    framework-free npm/TypeScript project foundation and a Docker Compose based
    local container workflow. The domain layer now includes default workout
    configuration, validation, and base64url share-link helpers. The workout
    core now includes scheduling, timer calculations, and session transitions.
    The bundled SVG icon registry now covers the eight HYROX stations plus
    a broader custom-exercise icon pool with Auto placeholder support. The app currently supports start, setup, live workout,
    and summary screens served by a small Node static server. Ordinary app entry starts on
    a minimal HIITBuddy screen with a single New Workout action, while config links open setup directly. The setup UI now
    uses a sequential People, Exercises, Timer flow so only one configuration
    area is visible at a time. The Timer setup step uses large touch-first
    stepper cards instead of a narrow office-like form. The workout starts with
    a configurable Get Ready assignment-preview countdown before the first work interval.
  implemented:
    - Structured product specification in .agent/*.yaml.
    - Core product decisions resolved for participant/exercise count, skipped rounds, finish availability, and HYROX default stations.
    - Increment-based execution state introduced in this file.
    - npm project with package.json and package-lock.json.
    - TypeScript configuration and src/main.ts entry point.
    - Plain CSS setup UI in src/styles.css.
    - Static HTML shell in src/index.html.
    - Build script that compiles TypeScript and copies static assets to dist.
    - Node static server in scripts/serve.mjs.
    - npm scripts for build, dev, start, check, and test.
    - Smoke test covering the project foundation.
    - .gitignore for node_modules and generated build output.
    - Dockerfile using node:24-alpine with a build stage and runtime stage.
    - docker-compose.yml exposing the app on port 8080.
    - Makefile with build, up, and down entry points; build rebuilds and starts the Docker Compose service.
    - .dockerignore for node_modules, dist, and local metadata.
    - Domain TypeScript types for people, exercises, timer settings, workout config, sessions, and assignments.
    - Default HYROX station catalog with all exercises initially deselected, 30/40/20/90 timer defaults, and no running station.
    - Config and start-workout validation helpers.
    - Base64url share-link encode/decode helpers using the config query parameter.
    - Domain tests for defaults, validation, and share-link round trips.
    - Scheduler module for modular person-to-exercise station rotation.
    - Timer module for monotonic countdown snapshots and repeatable extensions.
    - Session module for work, interval rest, round break, summary, skip, abandoned round, and finish transitions.
    - Workout-core tests for unique assignments, full round coverage, skips, extensions, and phase advancement.
    - SVG icon registry with text-free inline icons for the eight HYROX stations plus a custom-exercise icon pool.
    - Auto question-mark icon for new custom exercises, resolved to a concrete random bundled icon at workout start unless the user chooses a specific icon.
    - Icon rendering, lookup, availability, and search helpers.
    - Icon-registry tests covering default exercise icon coverage and SVG constraints.
    - Minimal HIITBuddy start screen with a text-free CSS circuit/timer drawing and New Workout as the only primary action for ordinary entry.
    - Shared config links open setup step 1 directly.
    - Sequential three-step setup UI for people, exercise selection, and timer/start actions.
    - Copy Link is available from all three setup steps.
    - Copy Link success feedback says "Settings copied".
    - People setup with active/pool handling.
    - Active and Pool people sections use very subtle different background tones.
    - Exercise setup with built-in selection and custom exercises.
    - Timer setup with copy link and start validation.
    - Timer setup uses four large touch-first stepper cards with direct numeric editing.
    - All timer settings are constrained to whole seconds from 5 through 300 in validation, setup state, and timer inputs.
    - Rest and Round Break extension buttons cap the current phase at 300 total seconds.
    - Add Person, Add Exercise, and Icon Picker dialogs.
    - Add Exercise dialog uses a square icon button next to the free-text name field, with icon labels shown only in the Icon Picker.
    - Setup-state tests for people, exercises, timers, and start validation.
    - Live workout UI with phase header, assignment cards, large countdown, timer band, and phase-specific controls.
    - Configurable one-time Get Ready countdown before the first work interval with visible upcoming assignments.
    - Work controls for Skip Exercise and Round Break.
    - Rest controls for +5, +10, and +20 seconds.
    - Round Break controls for +30, +60, and Finish.
    - Round Break upcoming assignment preview in the final 30 seconds, or from the start when the break duration is 30 seconds or less.
    - Assignment tile layout follows participant-count patterns: 1-3 in one row, 4-6 in two columns, 7 as 3/2/2, and 8+ in three columns.
    - Workout screens use compact density for larger participant groups so training views fit in one tablet-landscape viewport without scrolling.
    - Summary UI with completed rounds, abandoned rounds, active people, selected exercises, elapsed time, a subtle CSS-only completion animation, and New Workout returning to setup step 1.
    - Summary helpers and tests for compact elapsed-time formatting and summary facts.
    - Reduced structural UI chrome so setup and workout headers/stages avoid unnecessary frames, borders, and shadows.
    - Git workflow specification with commit-after-prompt rule.
    - Repository-local Git hooks for pre-commit verification and commit-message validation.
    - Dependency-free commit message validator enforcing Conventional Commits without scopes.
  not_implemented:
    - Web Components.
    - Application UI/runtime tests beyond the foundation, domain, workout-core, icon-registry, setup-state, and summary tests.
  known_constraints:
    - App text must be English.
    - UI must be appealing but minimalistic, with exactly the elements necessary for the current workflow.
    - Avoid long static texts and visible explanations of functions in primary screens.
    - Add Exercise must keep the visible exercise name and selected icon separate: the dialog shows only the icon graphic next to the name input, while icon labels appear only in the picker.
    - Put optional explanations behind info icons, tooltips, or popups only if needed later.
    - Use only necessary frames, panel boxes, borders, and hard edges; prefer a modern, lightweight layout over office-like chrome.
    - Use npm only.
    - Avoid frontend frameworks.
    - Use TypeScript and plain CSS.
    - Do not use cookies or browser storage APIs.
    - Runtime state is in memory only.
    - Share setup state only through a base64url URL parameter.
    - Setup should show one configuration area at a time: People, then Exercises, then Timer.
    - Timer setup should use the available tablet-landscape area with large touch controls rather than a narrow office-like form.
    - After each file-changing user prompt, verify and create a Git commit.
    - Commit messages must use Conventional Commits without scopes.

soll_zustand:
  summary: >
    A complete framework-free, tablet-first HIIT circuit web app served from one
    Docker container, locally controlled through Docker Compose and Make.
  capabilities:
    - Configure active people and pooled inactive people.
    - Select built-in HYROX station exercises.
    - Add custom exercises with bundled SVG icons or Auto icon resolution.
    - Configure Get Ready, work, rest, and round-break durations with 30/40/20/90 defaults.
    - Navigate setup forward and backward one step at a time without losing values.
    - Copy and load setup state through a base64url config query parameter.
    - Start an endless circuit workout.
    - Show a configurable one-time first-round preparation countdown before work begins.
    - Assign every active person to a unique exercise during each work interval.
    - Block workout start when active people exceed selected exercises.
    - Rotate assignments so every active person completes every selected exercise once per round.
    - Skip current exercise into rest.
    - Skip to round break and count the round as abandoned.
    - Extend interval rest by 5, 10, or 20 seconds.
    - Extend round break by 30 or 60 seconds.
    - Fade in next-round assignments during the final 30 seconds of round breaks.
    - Finish only during round break.
    - Show a summary with completed rounds, abandoned rounds, participants, exercises, and elapsed time.
  technical_completion:
    - npm scripts for build, dev, start, check, and test.
    - Minimal dependencies with justification.
    - Dockerfile using a Node image.
    - docker-compose.yml for local container execution.
    - Makefile exposing build, up, and down.
    - Git initialized with .githooks as core.hooksPath.
    - pre-commit hook running npm run check and npm test.
    - commit-msg hook enforcing Conventional Commits without scopes.
    - Unit tests for validation, share links, scheduler, and timer calculations.
    - Browser or manual verification for tablet landscape layouts.

